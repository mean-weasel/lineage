name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22.22.3'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run ci
