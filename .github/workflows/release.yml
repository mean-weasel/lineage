name: Release

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Release operation
        required: true
        default: publish-next
        type: choice
        options:
          - publish-next
          - promote-latest
      dry_run:
        description: Preview the release operation without changing npm
        required: true
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.3'
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Publish next dry run
        if: ${{ inputs.dry_run && inputs.operation == 'publish-next' }}
        run: npm run release -- --tag next --dry-run
      - name: Publish next
        if: ${{ !inputs.dry_run && inputs.operation == 'publish-next' }}
        run: npm run release -- --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Promote latest dry run
        if: ${{ inputs.dry_run && inputs.operation == 'promote-latest' }}
        run: npm run release -- --promote-latest --dry-run
      - name: Promote latest
        if: ${{ !inputs.dry_run && inputs.operation == 'promote-latest' }}
        run: npm run release -- --promote-latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
