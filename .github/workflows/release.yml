name: Release

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Release operation
        required: true
        default: publish-next
        type: choice
        options:
          - publish-next
          - publish-latest
          - promote-latest
      dry_run:
        description: Preview the release operation without changing npm
        required: true
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Configure release git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - uses: actions/setup-node@v5
        with:
          node-version: '22.22.3'
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Use release npm
        run: |
          npm install --global npm@10.9.8
          node --version
          npm --version
      - name: Install dependencies
        env:
          AGENT_OS_DEPLOY_KEY: ${{ secrets.AGENT_OS_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          test -n "$AGENT_OS_DEPLOY_KEY"
          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s\n' "$AGENT_OS_DEPLOY_KEY" > "$key_file"
          chmod 600 "$key_file"
          install -m 700 -d ~/.ssh
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts
          GIT_SSH_COMMAND="ssh -i $key_file -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" npm ci
      - run: npx playwright install --with-deps chromium
      - name: Publish next dry run
        if: ${{ inputs.dry_run && inputs.operation == 'publish-next' }}
        run: npm run release -- --tag next --dry-run
      - name: Publish next
        if: ${{ !inputs.dry_run && inputs.operation == 'publish-next' }}
        run: npm run release -- --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
      - name: Publish latest dry run
        if: ${{ inputs.dry_run && inputs.operation == 'publish-latest' }}
        run: |
          npm run release -- --tag latest --dry-run
          npm run release:github:dry-run
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Publish latest
        if: ${{ !inputs.dry_run && inputs.operation == 'publish-latest' }}
        run: |
          npm run release -- --tag latest
          npm run release:github
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          GH_TOKEN: ${{ github.token }}
      - name: Promote next to latest dry run
        if: ${{ inputs.dry_run && inputs.operation == 'promote-latest' }}
        run: |
          npm run release -- --promote-latest --dry-run --skip-ci
          npm run release:github:dry-run
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Promote next to latest
        if: ${{ !inputs.dry_run && inputs.operation == 'promote-latest' }}
        run: |
          npm run release -- --promote-latest --skip-ci
          npm run release:github
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ github.token }}
