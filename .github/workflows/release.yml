name: Release

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Release operation
        required: true
        default: publish-next
        type: choice
        options:
          - publish-next
          - publish-latest
      dry_run:
        description: Preview the release operation without changing npm
        required: true
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22.22.3'
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Use current npm
        run: |
          npm install --global npm@latest
          node --version
          npm --version
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Publish next dry run
        if: ${{ inputs.dry_run && inputs.operation == 'publish-next' }}
        run: npm run release -- --tag next --dry-run
      - name: Publish next
        if: ${{ !inputs.dry_run && inputs.operation == 'publish-next' }}
        run: npm run release -- --tag next
        env:
          NPM_CONFIG_PROVENANCE: true
      - name: Publish latest dry run
        if: ${{ inputs.dry_run && inputs.operation == 'publish-latest' }}
        run: npm run release -- --tag latest --dry-run
      - name: Publish latest
        if: ${{ !inputs.dry_run && inputs.operation == 'publish-latest' }}
        run: npm run release -- --tag latest
        env:
          NPM_CONFIG_PROVENANCE: true
