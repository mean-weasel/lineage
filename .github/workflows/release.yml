name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish
        required: true
        default: next
        type: choice
        options:
          - next
          - latest
      dry_run:
        description: Run npm publish without uploading
        required: true
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.3'
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Release dry run
        if: ${{ inputs.dry_run }}
        run: npm run release -- --tag "${{ inputs.tag }}" --dry-run
      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: npm run release -- --tag "${{ inputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
