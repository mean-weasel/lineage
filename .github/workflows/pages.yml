name: Deploy landing page

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22.22.3'
          cache: npm
      - id: pages
        uses: actions/configure-pages@v5
      - run: npm ci
      - run: node --test scripts/prepare-pages.test.mjs
      - name: Build landing page for its public base path
        env:
          LINEAGE_WEB_BASE: ${{ steps.pages.outputs.base_path }}/
        run: npm run build:web
      - run: node scripts/prepare-pages.mjs
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist/pages

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
